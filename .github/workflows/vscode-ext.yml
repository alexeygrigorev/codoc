name: VS Code Extension

on:
  push:
    paths:
      - "vscode-ext/**"
      - ".github/workflows/vscode-ext.yml"
  pull_request:
    paths:
      - "vscode-ext/**"
      - ".github/workflows/vscode-ext.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-ext
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "vscode-ext/package-lock.json"
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run compile
